# Stewra's OWN coturn instance — isolated from the shared rankrise-coturn.
#
# Why a separate instance (not a realm added to rankrise-coturn): that server runs in
# `use-auth-secret` (TURN REST) mode with a single GLOBAL static-auth-secret. In that mode the
# ephemeral credential HMAC is validated against the one secret regardless of realm, so a second
# realm on the same instance cannot have its own secret. A dedicated instance gives Stewra a truly
# separate secret and its own ports/relay-range while leaving RankRise/TrueTalk untouched.
#
# The static-auth-secret and --external-ip are injected on the command line (see
# docker-compose.prod.yml) so the secret never lives in this git-tracked file.

# Distinct ports from rankrise-coturn (3478/5349) since network_mode: host shares the host's port
# space. Plain turn: only for now (no tls-listening-port) — WebRTC permits turn: from https pages, and
# a turns: listener would require a turn.stewra.com certificate. Adding TLS is a documented follow-up.
listening-port=3481

# Relay port range distinct from rankrise's 49152-49200 so the two coturns never fight over a port.
min-port=49202
max-port=49250

realm=stewra.com
use-auth-secret

total-quota=100
stale-nonce=600
no-multicast-peers
fingerprint

# Bind + relay on the LAN interface (same host as rankrise-coturn). external-ip is supplied on the
# command line for NAT hairpinning. For LAN testing peers use the relay-ip candidate directly.
listening-ip=192.168.1.179
relay-ip=192.168.1.179

pidfile=/var/tmp/turnserver-stewra.pid
