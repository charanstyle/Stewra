# Stewra — served under the existing Cloudflare tunnel via the host's `tunnel-access` nginx
# (Cloudflare tunnel -> nginx :8080 -> these loopback container ports). Mirrors the truetalk/rankrise
# blocks already in /etc/nginx/sites-available/tunnel-access.
#
# Install on the host (run as a user with sudo):
#   sudo cp /media/WDHD/docker/stewra/deploy/nginx-stewra-tunnel.conf /etc/nginx/sites-available/stewra-tunnel
#   sudo ln -sf /etc/nginx/sites-available/stewra-tunnel /etc/nginx/sites-enabled/stewra-tunnel
#   sudo nginx -t && sudo systemctl reload nginx

# Maps the Upgrade request header to the Connection response header so WebSocket handshakes on /api/
# (Socket.IO's /api/socket.io/ transport) proxy correctly while normal HTTP keeps keep-alive. This is
# an http-context directive; a site file included from sites-enabled/ is already inside http{}. If the
# host's tunnel-access config defines `$connection_upgrade` elsewhere, drop this block to avoid a
# duplicate-map error.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name www.stewra.com stewra.com;
    client_max_body_size 10M;

    # Website — the static SPA (nginx container on 127.0.0.1:3022).
    location / {
        proxy_pass http://127.0.0.1:3022;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend API — the trailing slash on proxy_pass strips the /api/ prefix, so the backend (on
    # 127.0.0.1:3023) sees its own root routes (/auth, /connections, /insights, /messages, …) and the
    # Socket.IO endpoint at /socket.io/ (external /api/socket.io/). The Upgrade/Connection headers +
    # HTTP/1.1 let the WebSocket transport handshake through; without them Socket.IO silently falls
    # back to long-polling only.
    location /api/ {
        proxy_pass http://127.0.0.1:3023/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Long timeout covers both slow AI insight requests and long-lived WebSocket connections
        # (Socket.IO's own ~25s ping keeps an idle socket well under this ceiling).
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;
    }
}
