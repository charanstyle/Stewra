# Stewra — served under the existing Cloudflare tunnel via the host's `tunnel-access` nginx
# (Cloudflare tunnel -> nginx :8080 -> these loopback container ports). Mirrors the truetalk/rankrise
# blocks already in /etc/nginx/sites-available/tunnel-access.
#
# Install on the host (run as a user with sudo):
#   sudo cp /media/WDHD/docker/stewra/deploy/nginx-stewra-tunnel.conf /etc/nginx/sites-available/stewra-tunnel
#   sudo ln -sf /etc/nginx/sites-available/stewra-tunnel /etc/nginx/sites-enabled/stewra-tunnel
#   sudo nginx -t && sudo systemctl reload nginx
server {
    listen 8080;
    server_name www.stewra.com stewra.com;
    client_max_body_size 10M;

    # Website — the static SPA (nginx container on 127.0.0.1:3022).
    location / {
        proxy_pass http://127.0.0.1:3022;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend API — the trailing slash on proxy_pass strips the /api/ prefix, so the backend (on
    # 127.0.0.1:3023) sees its own root routes (/auth, /connections, /insights, /preferences, …).
    location /api/ {
        proxy_pass http://127.0.0.1:3023/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # AI insight requests can take a while.
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
