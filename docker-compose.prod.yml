# Production deployment artifact for the SSH host (home / 192.168.1.179).
# Lives at /media/WDHD/docker/stewra/ alongside the other apps and is fronted by the host's
# `tunnel-access` nginx (Cloudflare tunnel -> nginx :8080 -> these loopback ports).
#
# This does NOT define Postgres — it reuses the shared `postgres` container (external network
# `postgres_default`, reachable as host `postgres:5432`). Stewra has its own isolated `stewra`
# database + role; set DATABASE_URL in stewra.env to postgresql://stewra:<pw>@postgres:5432/stewra.
#
# Two env files are involved:
#   stewra.env  — backend RUNTIME env (DATABASE_URL, JWT_SECRET, VAULT_KEY, model + Google creds, …)
#   .env        — compose-substitution only; supplies the website's build-time VITE_API_BASE_URL
#
# Deploy (run ON the host, not the dev machine):
#   cd /media/WDHD/docker/stewra
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml run --rm backend node backend/dist/database/migrate.js
#   docker compose -f docker-compose.prod.yml up -d

services:
  # Stewra's OWN coturn (TURN/STUN) — deliberately NOT the shared rankrise-coturn, which runs in
  # use-auth-secret mode with a single global secret (a second realm there couldn't have its own
  # secret). This instance has a distinct realm, secret, ports (3481 / relay 49202-49250), and never
  # touches RankRise/TrueTalk. network_mode: host mirrors rankrise so relay candidates use the real LAN
  # IP. The secret + public IP are injected on the command line (never committed): TURN_STATIC_AUTH_SECRET
  # and TURN_EXTERNAL_IP come from the compose ./.env file; the SAME secret is TURN_SECRET in stewra.env
  # (the backend mints matching HMAC credentials). Gated by CALLS_ENABLED in stewra.env on the app side.
  coturn:
    image: coturn/coturn:latest
    container_name: stewra-coturn
    restart: unless-stopped
    network_mode: host
    command: >-
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_STATIC_AUTH_SECRET:?set TURN_STATIC_AUTH_SECRET in ./.env}
      --external-ip=${TURN_EXTERNAL_IP:?set TURN_EXTERNAL_IP in ./.env}
    volumes:
      - ./deploy/coturn/turnserver-stewra.conf:/etc/coturn/turnserver.conf:ro

  # Redis is REQUIRED by the realtime layer: the Socket.IO adapter (cross-instance room fan-out) and the
  # presence store. Isolated to this stack's own instance; set REDIS_URL=redis://redis:6379 in stewra.env.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - postgres_default

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: stewra-backend:latest
    restart: unless-stopped
    env_file: ./stewra.env
    depends_on:
      - redis
    # Loopback-only; the host nginx proxies /api/ here and strips the prefix.
    ports:
      - "127.0.0.1:3023:3001"
    networks:
      - postgres_default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Persisted media (recorded voice clips + Piper TTS output). Set UPLOADS_DIR=/data/uploads in
    # stewra.env so mediaService writes here; the named volume survives image rebuilds/redeploys.
    volumes:
      - stewra_uploads:/data/uploads
      # Claude Code SUBSCRIPTION credentials for the `claude` CLI model provider (MODEL_PROVIDER=claude_cli;
      # the CLI is installed in backend/Dockerfile). The container runs as root (HOME=/root), so the CLI
      # reads /root/.claude/.credentials.json. Mounted READ-WRITE on purpose: the CLI refreshes its OAuth
      # access token in place via the stored refresh token, so a long-lived deploy keeps working. The host
      # dir is provisioned at deploy time from the operator's own ~/.claude/.credentials.json and is NEVER
      # committed (it holds a bearer credential).
      - ./claude-home/.claude:/root/.claude

  website:
    build:
      context: .
      dockerfile: website/Dockerfile
      args:
        # Baked into the SPA at build time. Fails loud if unset (see website/Dockerfile).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?set VITE_API_BASE_URL in ./.env}
    image: stewra-website:latest
    restart: unless-stopped
    depends_on:
      - backend
    # Loopback-only; the host nginx proxies / here.
    ports:
      - "127.0.0.1:3022:80"

# The shared Postgres container's network, created by the postgres stack.
networks:
  postgres_default:
    external: true

volumes:
  # Owner-scoped media store (voice-in clips + TTS-out WAVs), served only via authenticated GET /media/:id.
  stewra_uploads:
