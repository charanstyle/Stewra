# Sign in to the Stewra app with credentials supplied via env.
#
# Credentials are injected at run time by run-features.sh as `--env EMAIL=... --env PASSWORD=...`
# (sourced from the repo-root .env.e2e). They are deliberately NOT declared with defaults here:
# Maestro 2.6.x lets a flow-level `env:` default win over the command-line `--env`, so a default
# would clobber the injected credential and the flow would type an empty string. run-features.sh
# fails loudly when the credentials are missing, so the "never sign in as a blank/wrong user"
# guarantee lives there, not in a placeholder default.
appId: com.stewra.app
---
- launchApp:
    clearState: true          # start from a signed-out state every run
- assertVisible: "Sign in"
- tapOn:
    id: "login-email-input"
- inputText: ${EMAIL}
- tapOn:
    id: "login-password-input"
- inputText: ${PASSWORD}
# Dismiss the keyboard before submitting: on shorter screens / taller keyboards the "Sign in"
# button sits behind the soft keyboard, so a tap on it would land on a key instead of the button.
- hideKeyboard
- tapOn:
    id: "login-submit"
# Landing on the Chats tab proves the token was issued and the user is verified.
- extendedWaitUntil:
    visible:
      text: "Chats"
    timeout: 20000
