# Single-device smoke test for placing a voice call.
#
# This verifies the caller side only: the call screen launches and can be ended.
# A true two-party connect/answer test needs a second live session and is covered
# by the website suite (website/e2e/calls.audio.mjs), which drives two users at
# once. Maestro drives one device, so we assert the outgoing-call UI, not connect.
#
# CONTACT_NAME is injected by run-features.sh (--env); no flow-level default, because a default
# overrides the injected value in Maestro 2.6.x. Empty CONTACT_NAME falls back to the first thread.
appId: com.stewra.app
---
# A preceding flow (e.g. send-message) may leave us inside a conversation. Return to the Chats
# list first so this flow is safe both standalone and chained after another.
- runFlow:
    when:
      notVisible: "Chats"
    commands:
      - pressKey: Back
- assertVisible: "Chats"
- tapOn:
    id: "tab-chats"
# Chat list rows are dynamic/user-generated content, so they stay text-selected.
- runFlow:
    when:
      true: ${CONTACT_NAME != ""}
    commands:
      - tapOn: ${CONTACT_NAME}
- runFlow:
    when:
      true: ${CONTACT_NAME == ""}
    commands:
      - tapOn:
          index: 0
          text: ".*"
- tapOn:
    id: "call-start-voice"
# The call screen should come up with a Hang up / End control; end it right away
# so the flow leaves no dangling ringing call.
- extendedWaitUntil:
    visible:
      id: "call-end"
    timeout: 15000
- tapOn:
    id: "call-end"
