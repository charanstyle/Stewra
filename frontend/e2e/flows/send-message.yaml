# Open a conversation and send a text message.
#
# Assumes the app is already signed in (run login.yaml first, or use full.yaml).
# CONTACT_NAME picks which thread to open; it is injected at run time by run-features.sh
# (--env CONTACT_NAME=...), so it is NOT given a default here — a flow-level default overrides
# the injected value in Maestro 2.6.x. MESSAGE_TEXT is a fixed payload (not injected), so it keeps
# a default. Neither bakes in a real person.
appId: com.stewra.app
env:
  MESSAGE_TEXT: "E2E hello from Maestro"
---
# A preceding flow may leave us inside a conversation. Return to the Chats list first so this
# flow is safe both standalone and chained after another.
- runFlow:
    when:
      notVisible: "Chats"
    commands:
      - pressKey: Back
- assertVisible: "Chats"
- tapOn:
    id: "tab-chats"
# Open the target thread by contact name (falls back to the first row if unset).
# Chat list rows are dynamic/user-generated content, so they stay text-selected —
# a fixed testID wouldn't be unique or meaningful per row.
- runFlow:
    when:
      true: ${CONTACT_NAME != ""}
    commands:
      - tapOn: ${CONTACT_NAME}
- runFlow:
    when:
      true: ${CONTACT_NAME == ""}
    commands:
      - tapOn:
          index: 0
          text: ".*"
- tapOn:
    id: "conversation-input"
- inputText: ${MESSAGE_TEXT}
# Dismiss the keyboard before tapping Send: the composer sits at the bottom of the screen and,
# while the soft keyboard is up, the Send button is below the fold (off the visible bounds), so
# Maestro can't see it. Hiding the keyboard brings the composer (with its now-populated Send
# button) back into view.
- hideKeyboard
- tapOn:
    id: "conversation-send"
# The sent bubble echoing our text confirms the message posted to the thread.
- extendedWaitUntil:
    visible:
      text: ${MESSAGE_TEXT}
    timeout: 15000
