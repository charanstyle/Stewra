# Serves the built Stewra SPA. The host's tunnel-access nginx terminates TLS and proxies here; this
# inner server only needs to serve static files and fall back to index.html for client-side routes.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths resolve to index.html so react-router routes (e.g. /activity) load.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Container liveness probe.
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
