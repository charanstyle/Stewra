# Packaging config for the Stewra Bridge desktop app.
#
# Produces installable artifacts per OS. Build each platform's target ON that OS (electron-builder can
# only build macOS .dmg on macOS and codesign Windows on Windows); this repo verifies the Linux targets.
# Artifacts are UNSIGNED here — code-signing/notarization certs are supplied at release time via CI env.
appId: com.stewra.bridge
productName: Stewra Bridge
copyright: Stewra

# electron-builder needs an exact Electron version to fetch the right platform binaries; package.json
# carries a "^33.2.0" range, so pin the resolved version here. Keep in step with the electron devDep.
electronVersion: 33.4.11

directories:
  # NOT `dist` — that is the TypeScript compiler's output; installers go somewhere separate.
  output: release
  buildResources: build

# Keep the scoped npm name (@stewra/bridge) out of artifact filenames — the "/" and "@" break paths.
artifactName: ${productName}-${version}-${arch}.${ext}

# `main` in package.json (dist/main/main.js) is the entry; electron-builder includes the compiled
# app plus production dependencies automatically and prunes devDependencies. We only need to keep the
# TypeScript sources and configs out of the shipped asar.
files:
  - '**/*'
  - '!**/*.ts'
  - '!tsconfig*.json'
  - '!electron-builder.yml'
  - '!scripts/**'

# Baileys / socket.io-client / zod are pure JS — no native addons to rebuild against Electron's ABI.
npmRebuild: false

linux:
  # The npm package is scoped (@stewra/bridge); an executable/file name can't contain "@" or "/".
  executableName: stewra-bridge
  target:
    - deb
    - AppImage
  category: Network
  maintainer: Stewra <noreply@stewra.com>
  icon: build/icon.png

mac:
  target:
    - dmg
  category: public.app-category.utilities
  icon: build/icon.png
  # Sign with the org's "Developer ID Application" certificate. This is the ONLY signature type macOS
  # will notarize for distribution outside the App Store; with a stapled notarization ticket, users get a
  # clean double-click (no Gatekeeper prompt at all). An ad-hoc seal ("-") only downgrades the hard
  # "damaged" block to the "unidentified developer / Open Anyway" gate — acceptable as a stopgap but not
  # for real users. The cert's private key lives in the Mac build machine's login keychain, so the mac
  # target must be built in an interactive login session there (codesign can't reach the key over SSH).
  # NB: give the cert common-name WITHOUT the "Developer ID Application:" prefix — electron-builder adds
  # the type itself and picks the matching Developer ID Application cert automatically.
  identity: 'Nurturing Lab Limited Company (35JR7LFXPF)'
  # Notarization REQUIRES the hardened runtime. electron-builder applies its default mac entitlements
  # (allow-jit / allow-unsigned-executable-memory / disable-library-validation) which Electron needs to
  # launch under hardened runtime — so no custom entitlements file is required here.
  hardenedRuntime: true
  # Don't let electron-builder run its own Gatekeeper assessment mid-build; the app isn't notarized yet
  # at sign time (we notarize + staple the .dmg afterward with `xcrun notarytool` / `stapler`).
  gatekeeperAssess: false
  # NOTE: notarization is a SEPARATE post-build step (notarytool submit --wait → stapler staple the .dmg),
  # driven by scripts/notarize-dmg so a contributor without notary credentials can still produce a signed
  # (un-notarized) build. See bridge/scripts/notarize-dmg.sh.

win:
  target:
    - nsis
  icon: build/icon.png
